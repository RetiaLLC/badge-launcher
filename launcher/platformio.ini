; pioarduino platform, pinned — bare "espressif32" resolves to whatever registry
; platform is installed (seen: tasmota IDF 4.4 → no esp_app_desc.h).
; ⚠ IDF VERSION MATTERS FOR THE DISPLAY: builds on IDF 5.5.1 (pioarduino
; 55.03.34) produce a BLACK SCREEN on the badge — app runs, menu works over
; serial, LCD dark. IDF 5.5.3 (v1's build) and 5.5.4 (this pin) display fine.
; Hardware-bisected 2026-07-09.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
; Force esptool 5.x — with the old registry espressif32 also installed, bare
; resolution can grab tool-esptoolpy 4.5.1, whose elf2image rejects the
; v5-style --flash-mode args this platform generates.
platform_packages =
  pioarduino/tool-esptoolpy @ https://github.com/pioarduino/registry/releases/download/0.0.1/esptoolpy-v5.1.0.zip
board = defcon-badge
framework = espidf
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
board_build.partitions = partitions-shared-v2.csv

; Badge Launcher — SD-card firmware launcher for the Retia 2024 DEF CON badge.
; Lives in the 768K factory partition; installs app bins from SD into ota_0.

[env:defcon-badge]
platform = espressif32
board = defcon-badge
framework = espidf
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
board_build.partitions = partitions-shared.csv
